<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LV UP — 현실을 게임처럼</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 600px;
    }
    h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      margin: 0 0 20px;
      background: linear-gradient(135deg, #fff 0%, #888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: #aaa;
      line-height: 1.6;
      margin: 0 0 40px;
    }
    .badge {
      display: inline-block;
      padding: 6px 14px;
      border: 1px solid #333;
      border-radius: 20px;
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 30px;
    }
    .signal {
      margin-top: 60px;
      font-size: 0.85rem;
      color: #555;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">SEASON ZERO · 2026</div>
    <h1>LV UP</h1>
    <p>현실을 게임처럼 살아가며,<br>자기 인생의 CEO가 되는 사람들의 세계</p>
    <div class="signal">// world initializing... //</div>
  </div>
</body>
</html>
